<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Glitch Intro</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=block" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #080808; }

    .scanlines {
      position: absolute; inset: 0; pointer-events: none; z-index: 20;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    }
    .noise {
      position: absolute; inset: 0; z-index: 15; pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='turbulence' baseFrequency='0.95' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .title-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .title-layer {
      position: absolute; font-family: "Bebas Neue", sans-serif;
      font-size: 380px; letter-spacing: 0.04em; color: #fff;
      text-align: center; line-height: 1;
      opacity: 0;
    }
    .title-r { color: #ff0033; mix-blend-mode: screen; }
    .title-g { color: #00ff88; mix-blend-mode: screen; }
    .title-b { color: #0066ff; mix-blend-mode: screen; }
    .title-main { z-index: 5; }

    .sub {
      position: absolute; bottom: 280px; left: 0; right: 0; text-align: center;
      font-family: "Share Tech Mono", monospace; font-size: 36px;
      color: rgba(255,255,255,0.4); letter-spacing: 0.3em;
      opacity: 0;
    }
    .sub-line {
      position: absolute; bottom: 240px; left: 50%; transform: translateX(-50%);
      width: 0; height: 2px; background: #fff;
    }
    .corner-code {
      position: absolute; font-family: "Share Tech Mono", monospace; font-size: 18px;
      color: rgba(255,255,255,0.15); letter-spacing: 0.08em; opacity: 0;
    }
    .cc-tl { top: 60px; left: 80px; }
    .cc-tr { top: 60px; right: 80px; text-align: right; }
    .cc-bl { bottom: 60px; left: 80px; }
    .cc-br { bottom: 60px; right: 80px; text-align: right; }

    .glitch-slice {
      position: absolute; left: 0; right: 0; height: 20px;
      background: rgba(255,255,255,0.03); transform: scaleX(0);
    }
  </style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1920" data-height="1080">
    <div class="scanlines"></div>
    <div class="noise"></div>

    <div class="glitch-slice" id="gs1" style="top:200px;"></div>
    <div class="glitch-slice" id="gs2" style="top:600px;"></div>
    <div class="glitch-slice" id="gs3" style="top:800px;"></div>

    <div class="corner-code cc-tl" id="ccTL">SYS_BOOT::0x0A4F<br/>INIT_SEQUENCE...</div>
    <div class="corner-code cc-tr" id="ccTR">FPS:60 | RES:1920×1080<br/>CODEC:H264</div>
    <div class="corner-code cc-bl" id="ccBL">© 2024 STUDIO<br/>v2.4.1-rc</div>
    <div class="corner-code cc-br" id="ccBR">RENDER:GPU<br/>STATUS:ONLINE</div>

    <div class="title-wrap">
      <div class="title-layer title-r" id="tR">GLITCH</div>
      <div class="title-layer title-g" id="tG">GLITCH</div>
      <div class="title-layer title-b" id="tB">GLITCH</div>
      <div class="title-layer title-main" id="tM">GLITCH</div>
    </div>

    <div class="sub-line" id="sl"></div>
    <div class="sub" id="sub">YOUR INTRO · YOUR BRAND · YOUR MOMENT</div>

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        window.__timelines = window.__timelines || {};
        window.__timelines["main"] = tl;

        // Corner codes flicker in
        tl.to(["#ccTL","#ccTR","#ccBL","#ccBR"], { opacity: 1, duration: 0.3, stagger: 0.08 }, 0.2);

        // Glitch slices
        function glitchSlice(id, t) {
          tl.to(id, { scaleX: 1, x: -40, duration: 0.06 }, t);
          tl.to(id, { scaleX: 0, x: 0, duration: 0.06 }, t + 0.08);
        }
        glitchSlice("#gs1", 0.5); glitchSlice("#gs2", 0.55); glitchSlice("#gs3", 0.52);
        glitchSlice("#gs1", 1.2); glitchSlice("#gs3", 1.22);
        glitchSlice("#gs2", 2.8); glitchSlice("#gs1", 2.82);

        // RGB split → merge
        tl.set(["#tR","#tG","#tB","#tM"], { opacity: 1 }, 0.8);
        tl.fromTo("#tR", { x: -80 }, { x: 0, duration: 0.6, ease: "power3.out" }, 0.8);
        tl.fromTo("#tG", { x: 80 }, { x: 0, duration: 0.6, ease: "power3.out" }, 0.8);
        tl.fromTo("#tB", { y: -40 }, { y: 0, duration: 0.6, ease: "power3.out" }, 0.8);
        tl.fromTo("#tM", { opacity: 0 }, { opacity: 1, duration: 0.2 }, 1.3);

        // Glitch the R/G/B channels periodically
        function rgbGlitch(t) {
          tl.to("#tR", { x: -12, duration: 0.05 }, t);
          tl.to("#tG", { x: 12, duration: 0.05 }, t);
          tl.to(["#tR","#tG","#tB"], { x: 0, y: 0, duration: 0.1 }, t + 0.08);
          glitchSlice("#gs1", t); glitchSlice("#gs2", t + 0.02);
        }
        rgbGlitch(2.5); rgbGlitch(4.0); rgbGlitch(6.5); rgbGlitch(9.0);

        tl.to("#sl", { width: 800, duration: 0.8, ease: "power3.out" }, 1.8);
        tl.to("#sub", { opacity: 1, duration: 0.6 }, 2.2);

        // Steady glow on main
        tl.to("#tM", { textShadow: "0 0 60px rgba(255,255,255,0.3)", duration: 1.5, yoyo: true, repeat: -1, ease: "sine.inOut" }, 3);
      })();
    </script>
  </div>
</body>
</html>
