<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Bold Manifesto</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=block" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0c0c0c; font-family: "Space Grotesk", sans-serif; }

    .bg-panel { position: absolute; inset: 0; background: #0c0c0c; }
    .accent-block {
      position: absolute; left: 0; top: 0; bottom: 0; width: 0;
      background: #fff;
    }
    .content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 180px; gap: 0;
    }
    .clip { overflow: hidden; }
    .word {
      display: block; font-size: 240px; font-weight: 700; line-height: 0.88;
      color: #fff; letter-spacing: -0.03em;
      transform: translateY(115%);
    }
    .word.dark { color: #0c0c0c; }
    .word.mid { font-weight: 300; color: rgba(255,255,255,0.35); font-size: 130px; letter-spacing: -0.01em; }
    .word.accent { color: #fff; }

    .side-label {
      position: absolute; left: 60px; bottom: 100px;
      font-size: 15px; font-weight: 500; letter-spacing: 0.3em;
      color: rgba(255,255,255,0.3); text-transform: uppercase;
      writing-mode: vertical-rl; transform: rotate(180deg);
      opacity: 0;
    }
    .bottom-rule {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 6px; background: #fff; transform: scaleX(0); transform-origin: 0 0;
    }
    .counter {
      position: absolute; right: 180px; bottom: 100px;
      font-size: 160px; font-weight: 700; color: rgba(255,255,255,0.05);
      line-height: 1; letter-spacing: -0.05em; opacity: 0;
    }
  </style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="15" data-width="1920" data-height="1080">
    <div class="bg-panel"></div>
    <div class="accent-block" id="accent"></div>
    <div class="counter" id="ctr">01</div>
    <div class="side-label" id="side">Brand Manifesto — 2024</div>
    <div class="bottom-rule" id="brule"></div>

    <div class="content">
      <div class="clip"><span class="word" id="w1">WE BUILD</span></div>
      <div class="clip"><span class="word mid" id="w2">things that matter.</span></div>
      <div class="clip"><span class="word" id="w3">BOLDLY.</span></div>
    </div>

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        window.__timelines = window.__timelines || {};
        window.__timelines["main"] = tl;

        tl.to("#accent", { width: 12, duration: 0.5, ease: "power4.out" }, 0.2);
        tl.to("#ctr", { opacity: 1, duration: 0.4 }, 0.3);
        tl.to("#side", { opacity: 1, duration: 0.6 }, 0.5);
        tl.to("#w1", { y: 0, duration: 0.8, ease: "power4.out" }, 0.6);
        tl.to("#w2", { y: 0, duration: 0.9, ease: "power4.out" }, 1.05);
        tl.to("#w3", { y: 0, duration: 0.8, ease: "power4.out" }, 1.45);
        tl.to("#brule", { scaleX: 1, duration: 1.2, ease: "power3.out" }, 2.0);

        // Accent flash
        tl.to("#accent", { width: 960, duration: 0.25, ease: "power4.out" }, 5.0);
        tl.to(["#w1","#w2","#w3"], { color: "#0c0c0c", duration: 0.1 }, 5.15);
        tl.to("#accent", { width: 12, duration: 0.5, ease: "power4.in" }, 5.25);
        tl.to(["#w1","#w2","#w3"], { color: "", duration: 0.1 }, 5.25);

        // Cycle counter
        tl.set("#ctr", { innerHTML: "02" }, 7.5);
        tl.set("#ctr", { innerHTML: "03" }, 11.0);
      })();
    </script>
  </div>
</body>
</html>
